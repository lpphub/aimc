<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="black"></rect>

  <!-- 中心核心 -->
  <circle cx="50" cy="50" r="10" fill="#00eaff"></circle>

  <!-- 四个节点 -->
  <circle cx="50" cy="20" r="5" fill="#00eaff"></circle>
  <circle cx="80" cy="50" r="5" fill="#00eaff"></circle>
  <circle cx="50" cy="80" r="5" fill="#00eaff"></circle>
  <circle cx="20" cy="50" r="5" fill="#00eaff"></circle>

  <!-- 连接线 -->
  <g stroke="#00eaff" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="50" x2="50" y2="20"></line>
    <line x1="50" y1="50" x2="80" y2="50"></line>
    <line x1="50" y1="50" x2="50" y2="80"></line>
    <line x1="50" y1="50" x2="20" y2="50"></line>
  </g>
</svg>